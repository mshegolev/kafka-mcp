name: Release

# Triggers:
#   - v* tag push → build + TestPyPI dry-run + gated live PyPI publish
#   - workflow_dispatch → build + TestPyPI dry-run only (no live publish)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Default: read-only. The publish jobs elevate to id-token: write so PyPI /
# TestPyPI can verify the OIDC Trusted Publisher — no API tokens are stored.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # build: hatch build + twine check — produces sdist + wheel artifacts
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch twine

      - name: Build sdist and wheel
        run: hatch build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/

  # ---------------------------------------------------------------------------
  # testpypi-upload: dry-run publish to TestPyPI (runs on both tag + dispatch)
  # ---------------------------------------------------------------------------
  testpypi-upload:
    needs: [build]
    runs-on: ubuntu-latest
    # OIDC Trusted Publisher on test.pypi.org — no TWINE_PASSWORD / stored token.
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # ---------------------------------------------------------------------------
  # pypi-publish: live PyPI publish — ONLY on tag push, gated by environment
  #
  # SECURITY (T-07-01, T-07-03):
  #   - Condition: tag push only — workflow_dispatch cannot trigger live publish
  #   - environment: pypi requires manual approval in GitHub repo settings
  #   - id-token: write granted only to this job (OIDC Trusted Publisher)
  #   - No stored token: PyPI verifies the OIDC identity via a Trusted Publisher
  #     configured for repo mshegolev/kafka-mcp, workflow release.yml, env pypi
  # ---------------------------------------------------------------------------
  pypi-publish:
    needs: [testpypi-upload]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
